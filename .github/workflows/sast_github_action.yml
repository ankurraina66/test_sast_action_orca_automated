name: "Build Summary & PR Decoration for HCL AppScan SAST"

on:
workflow_dispatch:
pull_request:
push:
branches: [ main ]

permissions:
contents: read
security-events: write

jobs:
scan:
runs-on: self-hosted

steps:
  - name: Checkout
    uses: actions/checkout@v4

  - name: Run AppScan SAST scan
    uses: ankurraina66/test_sast_action_orca@main
    with:
      asoc_key: ${{ secrets.ASOC_KEY }}
      asoc_secret: ${{ secrets.ASOC_SECRET }}
      application_id: 1dd70de0-f756-4cd4-bad3-8354731ceff4
      acceptssl: ${{ secrets.ACCEPTSSL }}

  - name: Post AppScan PR comment
    if: github.event_name == 'pull_request'
    uses: actions/github-script@v7
    with:
      script: |
        const fs = require('fs');

        if (fs.existsSync('appscan_pr_report.md')) {

          const body = fs.readFileSync('appscan_pr_report.md', 'utf8');

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
            body: body
          });

        }

  - name: Upload SARIF to GitHub Security tab
    if: always()
    uses: github/codeql-action/upload-sarif@v4
    with:
      sarif_file: appscan-results.sarif
```
